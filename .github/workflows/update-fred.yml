name: Update FRED data (data/fred/)

on:
  schedule:
    # Daily at 22:00 UTC on weekdays — 1 hour after Yahoo Finance fetch
    # Captures same-day updates for daily series (T10Y2Y, VIXCLS, HY OAS, etc.)
    - cron: "0 22 * * 1-5"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: update-data      # shared with Yahoo workflow — serializes pushes
  cancel-in-progress: false

jobs:
  update-fred:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install fredapi python-dotenv

      - name: Pull latest changes before modifying data
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git pull --rebase origin main

      - name: Fetch FRED series and write bundle
        env:
          FRED_API_KEY: ${{ secrets.FRED_API_KEY }}
        run: python fetch_fred.py

      - name: Commit and push FRED data (if any changes)
        run: |
          git add data/fred/
          git diff --cached --quiet || git commit -m "Update FRED data"
          git push
